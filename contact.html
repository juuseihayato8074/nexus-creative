<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CONTACT | NEXUS CREATIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Noto+Serif+JP:wght@200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header>
      <div class="header__logo">
        <a href="#"><img src="images/logo.png" alt="ロゴ画像" /></a>
      </div>
      <div class="header__nav">
        <ul class="nav__links">
          <li><a href="index.html">TOP</a></li>
          <li><a href="service.html">SERVICE</a></li>
          <li><a href="about.html">ABOUT</a></li>
          <li><a href="contact.html" class="nav__active">CONTACT</a></li>
        </ul>
      </div>
      <button class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>
    <main>
      <section class="contact">
        <div class="section__header animate">
          <p class="section__en">CONTACT</p>
          <p class="section__slash">/</p>
          <h1 class="section__ja">お問い合わせ</h1>
        </div>
        <p class="contact__text">お気軽にお問い合わせください</p>
        <form
          class="contact__form"
          id="contactForm"
          action="contact.php"
          method="POST"
          novalidate
        >
          <div class="contact__item">
            <label class="contact__label"
              >お名前<span class="required">必須</span></label
            >
            <input type="text" name="name" placeholder="山田　太郎" />
            <p class="error__message" id="nameError"></p>
          </div>
          <div class="contact__item">
            <label class="contact__label"
              >メールアドレス<span class="required">必須</span></label
            >
            <input type="email" name="email" placeholder="example@email.com" />
            <p class="error__message" id="emailError"></p>
          </div>
          <div class="contact__item">
            <label class="contact__label"
              >お問い合わせ内容<span class="required">必須</span></label
            >
            <textarea
              name="message"
              placeholder="お問い合わせ内容をご入力ください"
            ></textarea>
            <p class="error__message" id="messageError"></p>
          </div>
          <button type="submit" class="contact__btn">送信する</button>
        </form>
      </section>
    </main>
    <footer>
      <div class="footer__content">
        <div class="footer__info">
          <div class="footer__logo">
            <a href="#"><img src="images/logo.png" alt="ロゴ画像" /></a>
          </div>
          <p class="footer__address">〒163-8001　東京都新宿区新宿2-8-1</p>
          <p class="footer__tel">TEL：03-1234-5678</p>
        </div>
        <div class="footer__nav">
          <ul class="nav__links">
            <li><a href="index.html">TOP</a></li>
            <li><a href="service.html">SERVICE</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="contact.html">CONTACT</a></li>
          </ul>
        </div>
      </div>
      <p class="footer__copyright">&copy; 2026 NEXUS CREATIVE</p>
    </footer>
    <script src="js/main.js"></script>
  </body>
</html>
